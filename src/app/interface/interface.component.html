<lcars-app>
  <header lcars-app-header>
    <lcars-bar [title]="title || ''" titleSide="right" fill></lcars-bar>
  </header>

  <nav lcars-app-sidebar>
    <lcars-nav>
      @for (c of sidebar; track $index) {
        <button lcars-nav-item [active]="active === c.target?.tab" (click)="do(c.target)">
          {{ c.target?.label }}
        </button>
      }
    </lcars-nav>
  </nav>

  <main lcars-app-content>
    @for (r of contentEntries; track r.key) {
      @if (active === r.key) {
        <lcars-container [configuration]="r.value"></lcars-container>
      }
    }
    <lcars-bar [title]="footer || ''" titleSide="left"></lcars-bar>
  </main>
</lcars-app>
