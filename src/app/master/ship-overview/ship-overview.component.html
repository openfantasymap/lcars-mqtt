<div class="ship-overview">
    <button class="add-ship" (click)="ships.addShip()">+ Add ship</button>

    <div *ngFor="let ship of ships.ships" class="ship-card">
        <div class="ship-head">
            <input class="name" [(ngModel)]="ship.name" (change)="commit()" placeholder="ship name">
            <input class="reg" [(ngModel)]="ship.registry" (change)="commit()" placeholder="registry">
            <select [(ngModel)]="ship.alert" (ngModelChange)="commit()">
                <option value="default">Condition: Default</option>
                <option value="yellow">Yellow Alert</option>
                <option value="red">Red Alert</option>
                <option value="black">Black Alert</option>
            </select>
            <button class="del" (click)="ships.removeShip(ship.id)">remove ship</button>
        </div>

        <table class="stats">
            <thead>
                <tr><th>Stat</th><th>Value</th><th>Max</th><th>Unit</th><th></th></tr>
            </thead>
            <tbody>
                <tr *ngFor="let s of ship.stats">
                    <td><input [(ngModel)]="s.label" (change)="commit()"></td>
                    <td><input class="num" [(ngModel)]="s.value" (change)="commit()"></td>
                    <td><input class="num" type="number" [(ngModel)]="s.max" (change)="commit()"></td>
                    <td><input class="unit" [(ngModel)]="s.unit" (change)="commit()"></td>
                    <td><button (click)="ships.removeStat(ship.id, s.key)">x</button></td>
                </tr>
            </tbody>
        </table>

        <div class="add-stat">
            <input placeholder="new stat label" [(ngModel)]="newStat[ship.id]">
            <button (click)="addStat(ship)">+ stat</button>
        </div>
    </div>

    <div *ngIf="ships.ships.length === 0" class="muted">No ships — add one to begin.</div>
</div>
