<div class="ship-stats" *ngIf="ship">
    <div class="ship-name">
        <span class="name">{{ship.name}}</span>
        <span class="reg" *ngIf="ship.registry">{{ship.registry}}</span>
        <span class="alert alert-{{ship.alert}}" *ngIf="ship.alert && ship.alert !== 'default'">{{ship.alert}}</span>
    </div>

    <div *ngFor="let s of stats" class="stat">
        <div class="stat-head">
            <span class="label">{{s.label}}</span>
            <span class="ctrl" *ngIf="canAct(s)">
                <button (click)="adjust(s, -1)">&minus;</button>
                <button (click)="adjust(s, 1)">+</button>
            </span>
            <span class="val">{{s.value}}{{s.unit}}</span>
        </div>
        <div *ngIf="s.max" class="bar">
            <div class="fill" [style.width.%]="pct(s)"></div>
        </div>
    </div>
</div>

<div class="ship-stats empty" *ngIf="!ship">Awaiting telemetry…</div>
