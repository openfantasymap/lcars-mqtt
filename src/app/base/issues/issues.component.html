<lcars-bar title="Active Directives" titleSide="right"></lcars-bar>

@if (open.length === 0) {
  <lcars-readout value="No active directives"></lcars-readout>
}

@for (i of open; track i.id) {
  <lcars-panel>
    <lcars-row spaceBetween>
      <lcars-readout [label]="i.title" [color]="severityColor(i)"></lcars-readout>
      <lcars-indicator [state]="severityState(i)" [label]="i.mode === 'auto' ? 'AUTO' : 'GM'"></lcars-indicator>
    </lcars-row>
    <lcars-textbox>{{ i.description }}</lcars-textbox>
    <lcars-textbox textColor="muted">{{ i.mode === 'auto' ? 'Resolves when conditions are met' : 'Awaiting GM confirmation' }}</lcars-textbox>
  </lcars-panel>
}
