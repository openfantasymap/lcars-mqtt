<div class="lcars-issues">
    <div class="lcars-issues-title">Active Directives</div>

    <div *ngIf="open.length === 0" class="lcars-issue empty">No active directives</div>

    <div *ngFor="let i of open" class="lcars-issue sev-{{i.severity}}">
        <div class="head">
            <span class="title">{{i.title}}</span>
            <span class="badge">{{i.mode === 'auto' ? 'AUTO' : 'GM'}}</span>
        </div>
        <div class="desc">{{i.description}}</div>
        <div class="foot">{{i.mode === 'auto' ? 'Resolves when conditions are met' : 'Awaiting GM confirmation'}}</div>
    </div>
</div>
