# Netlify deploy config for the lcars-mqtt Angular app.
# Static SPA: Netlify builds with the Angular CLI and serves dist/lcars-mqtt.

[build]
  # After building, bake the MQTT_* build env vars into assets/env.json so the
  # app picks them up at runtime (see scripts/netlify-env.js and src/main.ts).
  command = "npm run build && node scripts/netlify-env.js"
  # Angular's application builder nests the deployable output under /browser.
  publish = "dist/lcars-mqtt/browser"

[build.environment]
  # Angular 21 requires Node >= 20.19; build verified on Node 20.
  NODE_VERSION = "20"
  # Broker connection (override these in the Netlify UI or here as needed):
  # MQTT_HOST = "mqtt.fantasymaps.org"
  # MQTT_PORT = "9001"
  # MQTT_PATH = "/ws"
  # MQTT_PROTOCOL = "wss"

# SPA fallback: client-side routes like /lcars/:room/master must resolve to
# index.html. Netlify serves real files (JS/CSS/assets) first, so this only
# catches unmatched app routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
